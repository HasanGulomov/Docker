services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: laravel_api
    restart: unless-stopped
    depends_on:
      - db
    command: >
      sh -c "cp -n .env.example .env || true && 
             composer install && 
             php artisan key:generate --no-interaction --force && 
             php artisan migrate --force && 
             php artisan serve --host=0.0.0.0 --port=8000"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
      - /var/www/html/vendor
    networks:
      - laravel-network

  db:
    image: mysql:8.0
    container_name: laravel_db
    restart: always
    environment:
      MYSQL_DATABASE: laravel_db
      MYSQL_ROOT_PASSWORD: "1111"
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - laravel-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: react_client
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - laravel-network

networks:
  laravel-network:
    driver: bridge

volumes:
  db_data:
